<!DOCTYPE html>
<html lang="lv" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeForge — Panelis</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/timer.css">
    <link rel="stylesheet" href="css/pet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
    <script>(function(){const t=localStorage.getItem('tf_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body data-page="dashboard">
    <div id="toast-container"></div>
    <canvas id="confetti-canvas"></canvas>
    <div id="achievement-popup" class="achievement-popup hidden">
        <div class="achievement-content">
            <div class="achievement-glow"></div>
            <div class="achievement-icon">🏆</div>
            <h3 class="achievement-title"></h3>
            <p class="achievement-description"></p>
            <div class="achievement-points">+<span>0</span> XP</div>
        </div>
    </div>

    <div id="app-loader" class="app-loader"><div class="loader-spinner"></div><span>TimeForge</span></div>
    <div id="app">
        <div id="main-app" class="main-app" style="display:none">
            <main class="main-content">
                <div class="page-container">
                    <div id="dashboard-page" class="page active"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container"></div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/confetti.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pet.js"></script>
</body>
</html>
